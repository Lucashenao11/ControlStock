
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Inicio de Sesión</title>
    <!-- Esta línea conecta el HTML con tu CSS externo -->
    <link rel="stylesheet" href="app.css">

</head>
  
<body>

  <div style="text-align: center;">

    <H1>BIENVENIDO A CONTROL STOCK</H1>
    <H2>Manten al dia el inventario de tu tienda</H2>

  </div>

  <div class = "Login-box">
    <!-- Campo de usuario -->
    <h2>Iniciar Sesión</h2>
    <div class = "input-user">
      <label for="username">Usuario o correo</label>
      <input type = "text" id="username" name="username" placeholder="Ingresa tu usuario" required>
    </div>
    <!-- Campo de contraseña -->
    <div class="input-password">
      <label for="password">contraseña</label>
      <input type = "text" id="password" name="password" placeholder="Ingresa tu contraseña" required>
    </div>

    <button type="submit" class="btn-login">Ingresar</button>


  </div>


</body>
</html>
