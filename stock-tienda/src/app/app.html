<h1>ControlStock</h1>
<h2>Iniciar Sesión</h2>

<form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="card">
  <label>
    Correo
    <input type="email" formControlName="email" placeholder="correo@ejemplo.com" />
  </label>

  <div class="error"
    *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
    Ingresa un correo válido.
  </div>

  <label>
    Contraseña
    <input type="password" formControlName="password" placeholder="******" />
  </label>

  <div class="error"
  *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
  La contraseña debe tener al menos 6 caracteres.
</div>

<button type="submit" [disabled]="loginForm.invalid">
  Iniciar Sesión
</button>
</form>
